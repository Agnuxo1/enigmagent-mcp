name: Publish

# Tag-driven release. Push a tag like `v1.0.6` to trigger:
#   1. npm publish (uses NPM_TOKEN repo secret + provenance)
#   2. mcp-publisher publish (uses GitHub Actions OIDC — no token needed)
#
# Pre-flight on user side (one-time):
#   - Generate npm token at https://www.npmjs.com/settings/agnuxo/tokens
#     (Granular Access Token, scope: enigmagent-mcp, read+write)
#   - Add as repo secret NPM_TOKEN at
#     https://github.com/Agnuxo1/enigmagent-mcp/settings/secrets/actions

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write  # required for npm provenance + mcp-publisher OIDC

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp-registry:
    name: Publish to MCP Registry (OIDC)
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - uses: actions/checkout@v4
      - name: Download mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz mcp-publisher
          chmod +x mcp-publisher
      - name: Verify server.json version matches tag
        run: |
          SERVER_VERSION=$(jq -r .version server.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$SERVER_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match server.json version $SERVER_VERSION"
            exit 1
          fi
      - name: Authenticate via GitHub Actions OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
